<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BasketBall ScoreBoard</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <main>
        <div class="container">
            <div class="col">
                <h2>Home</h2>
                <div class="board">
                    <h2 class="score">0</h2>
                </div>
                <div class="btns">
                    <button class="btn one">+1</button>
                    <button class="btn two">+2</button>
                    <button class="btn three">+3</button>
                </div>
            </div>

            <div class="col">
                <h2>Guest</h2>
                <div class="board">
                    <h2 class="score">0</h2>
                </div>
                <div class="btns">
                    <button class="btn one">+1</button>
                    <button class="btn two">+2</button>
                    <button class="btn three">+3</button>
                </div>
            </div>
        </div>
    </main>
    <script src="./index.js"></script>
</body>
</html>
